<style>
:root{--bg0:#07080a;--bg1:#0c0f13;--bg2:#111519;--bg3:#171c22;--line:#1e262f;--line2:#28323d;--green:#00c97a;--green-bg:rgba(0,201,122,.1);--green-bd:rgba(0,201,122,.22);--red:#e8334a;--red-bg:rgba(232,51,74,.1);--red-bd:rgba(232,51,74,.22);--blue:#3d9cf5;--amber:#f0a530;--purple:#9b72f5;--t0:#edf2f7;--t1:#7d95ab;--t2:#3d5060;--t3:#243038;--mono:"IBM Plex Mono",monospace;--sans:"IBM Plex Sans",sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg0);color:var(--t0);font-family:var(--mono);font-size:12px;line-height:1.5;min-height:100vh}
.topbar{height:42px;background:var(--bg1);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:200}
.brand{font-family:var(--sans);font-size:14px;font-weight:700;letter-spacing:.04em}.brand em{color:var(--green);font-style:normal;font-weight:300}
.topbar-r{display:flex;align-items:center;gap:14px;font-size:10px;color:var(--t2)}
.dot-live{display:flex;align-items:center;gap:5px;color:var(--green)}
.dot-live::before{content:"";width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tape{height:28px;background:var(--bg1);border-bottom:1px solid var(--line);overflow:hidden}
.tape-inner{display:inline-flex;gap:28px;white-space:nowrap;animation:scroll 32s linear infinite;padding:5px 0}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:7px;font-size:10px}

.layout{display:grid;grid-template-columns:240px 1fr 264px;height:calc(100vh - 70px)}

.wl{border-right:1px solid var(--line);background:var(--bg1)}

.main{background:var(--bg0);overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
.sh{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:14px;border-bottom:1px solid var(--line)}

.sh-name{font-family:var(--sans);font-size:12px;font-weight:300;color:var(--t1);margin-top:3px}
.sh-tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.tag{font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--line2);color:var(--t1)}
.tag.growth{border-color:rgba(155,114,245,.3);color:var(--purple);background:rgba(155,114,245,.07)}
.tag.value{border-color:rgba(240,165,48,.3);color:var(--amber);background:rgba(240,165,48,.07)}
.tag.blend{border-color:rgba(61,156,245,.3);color:var(--blue);background:rgba(61,156,245,.07)}
.tag.bull{border-color:var(--green-bd);color:var(--green);background:var(--green-bg)}
.tag.bear{border-color:var(--red-bd);color:var(--red);background:var(--red-bg)}
.sh-price{font-family:var(--sans);font-size:34px;font-weight:300;letter-spacing:-.02em}
.sh-chg{font-family:var(--sans);font-size:16px;font-weight:500;margin-top:2px}
.sh-chg.u{color:var(--green)}.sh-chg.d{color:var(--red)}
.metrics{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}
.mc{background:var(--bg1);padding:10px 12px}
.mc-l{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);margin-bottom:4px}
.mc-v{font-family:var(--sans);font-size:15px;font-weight:500}
.mc-v.u{color:var(--green)}.mc-v.d{color:var(--red)}.mc-v.hi{color:var(--amber)}
.qbar-wrap{display:flex;align-items:center;gap:10px;margin-top:6px}
.qbar-track{flex:1;height:4px;background:var(--bg3)}
.qbar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));transition:width 1.2s cubic-bezier(.16,1,.3,1)}
.csec{background:var(--bg1);border:1px solid var(--line)}
.csec-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--line)}
.csec-title{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--t2)}
.dtable{width:100%;border-collapse:collapse}
.dtable th{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);padding:7px 12px;border-bottom:1px solid var(--line);text-align:left;font-weight:400}
.dtable td{padding:8px 12px;border-bottom:1px solid var(--line);color:var(--t1)}
.dtable tr:hover td{background:var(--bg2)}.dtable tr:last-child td{border:none}
.td0{color:var(--t0);font-weight:500}.tdu{color:var(--green);font-weight:600}.tdd{color:var(--red);font-weight:600}
.bar-in{display:flex;align-items:center;gap:6px}.bit{flex:1;height:2px;background:var(--bg3)}
.bif{height:100%;transition:width 1s ease}
.rbar{border-left:1px solid var(--line);background:var(--bg1);display:flex;flex-direction:column}
.mv-row{display:grid;grid-template-columns:14px 1fr auto;gap:8px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--line)}
.mv-n{font-size:9px;color:var(--t3);text-align:right}.mv-t{font-size:11px;font-weight:500}
.mv-s{font-size:9px;color:var(--t2);font-family:var(--sans)}.mv-p{font-size:11px;font-weight:600}
.mv-p.u{color:var(--green)}.mv-p.d{color:var(--red)}
.pipe-row{padding:10px 14px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr auto;gap:6px;align-items:start}
.pipe-name{font-size:11px;font-weight:500;color:var(--t0)}.pipe-meta{font-size:9px;color:var(--t2);font-family:var(--sans);line-height:1.5;margin-top:2px}
.badge{font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;font-weight:600;white-space:nowrap}
.badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.badge.run{background:rgba(61,156,245,.1);color:var(--blue);border:1px solid rgba(61,156,245,.25)}

.footer-ds-l{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--t2);font-size:11px;letter-spacing:.1em}
</style>

<script>
let SNAPSHOT = [], RANKING = [], SECTORS = [], current = null;

async function load() {
  try {
    [SNAPSHOT, RANKING, SECTORS] = await Promise.all([
      fetch("/api/snapshot").then(r=>r.json()),
      fetch("/api/ranking").then(r=>r.json()),
      fetch("/api/sectors").then(r=>r.json()),
    ]);
    if (SNAPSHOT.length) {
      document.getElementById("runDate").textContent = "Snapshot: " + SNAPSHOT[0].date;
      buildTape(); buildWL(); buildMovers(); buildRbar();
      select(SNAPSHOT[0].ticker);
    }
  } catch(e) { console.error(e); }
}

function pct(v){ return v >= 0 ? `+${v.toFixed(2)}%` : `${v.toFixed(2)}%`; }
function dir(v){ return v >= 0 ? "u" : "d"; }
function arr(v){ return v >= 0 ? "▲" : "▼"; }

function buildTape(){
  const items = SNAPSHOT.map(s => {
    const roe = s.roe_pct || 0;
    return `<span class="ti"><span class="ti-s">${s.ticker}</span><span class="ti-p">${(s.close||0).toFixed(2)}</span><span class="ti-c ${dir(roe)}">${arr(roe)} ROE ${roe.toFixed(1)}%</span></span>`;
  });
  const t = items.join("") + items.join("");
  document.getElementById("tape").innerHTML = t;
}

function buildWL(){
  const el = document.getElementById("wl");
  let html = '<div class="plabel">Coverage Universe</div>';
  SNAPSHOT.forEach(s => {
    const style = (s.equity_style||"blend").toLowerCase();
    html += `<div class="wl-row" onclick="select('${s.ticker}')" id="wl-${s.ticker}">
      <div>
        <div class="wl-tick">${s.ticker}</div>
        <div class="wl-name">${(s.sector||"").replace("Communication Services","Comm. Services")}</div>
        <div class="wl-style ${style}">${style.toUpperCase()}</div>
      </div>
      <div class="wl-r">
        <div class="wl-price">${(s.close||0).toFixed(2)}</div>
        <div class="wl-chg ${dir(s.net_margin_pct||0)}">M ${(s.net_margin_pct||0).toFixed(1)}%</div>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

function buildMovers(){
  const byRoe = [...SNAPSHOT].sort((a,b) => (b.roe_pct||0) - (a.roe_pct||0));
  const top5 = byRoe.slice(0,5);
  const bot5 = byRoe.slice(-5).reverse();
  function rows(arr2, cls){
    return arr2.map((s,i) => `<div class="mv-row">
      <span class="mv-n">${i+1}</span>
      <div><div class="mv-t">${s.ticker}</div><div class="mv-s">${(s.sector||"").split(" ")[0]}</div></div>
      <span class="mv-p ${cls}">${(s.roe_pct||0).toFixed(1)}%</span>
    </div>`).join("");
  }
  document.getElementById("rbar").innerHTML = `
    <div class="plabel">ROE Ranking</div>
    <div style="padding:6px 14px 3px;font-size:8px;letter-spacing:.12em;color:var(--t2);text-transform:uppercase">Top ROE</div>
    ${rows(top5,"u")}
    <div style="padding:6px 14px 3px;font-size:8px;letter-spacing:.12em;color:var(--t2);text-transform:uppercase;border-top:1px solid var(--line)">Bottom ROE</div>
    ${rows(bot5,"d")}
    <div class="plabel" style="margin-top:4px">Pipeline</div>
    <div class="pipe-row"><div><div class="pipe-name">Bronze</div><div class="pipe-meta">yfinance · 5yr OHLCV<br>S3 raw/</div></div><span class="badge ok">done</span></div>
    <div class="pipe-row"><div><div class="pipe-name">Silver</div><div class="pipe-meta">MA · BB · Fundamentals<br>Quality Score</div></div><span class="badge ok">done</span></div>
    <div class="pipe-row"><div><div class="pipe-name">Gold</div><div class="pipe-meta">equity_ranking<br>sector_valuation</div></div><span class="badge ok">done</span></div>
    <div class="pipe-row"><div><div class="pipe-name">AWS S3</div><div class="pipe-meta">projectalphav · us-east-1<br>Versioning enabled</div></div><span class="badge ok">active</span></div>
    <div class="footer-ds"><div class="footer-ds-l">Stack</div><div>yfinance · boto3 · pandas</div><div>AWS S3 · Apache Airflow</div><div>Flask · PyArrow · Docker</div></div>
  `;
}

function buildRbar(){ buildMovers(); }

function select(ticker){
  current = ticker;
  document.querySelectorAll(".wl-row").forEach(r => r.classList.remove("on"));
  const el = document.getElementById("wl-"+ticker);
  if(el) el.classList.add("on");

  const s = SNAPSHOT.find(x => x.ticker === ticker) || {};
  const r = RANKING.find(x => x.ticker === ticker) || {};
  const style = (s.equity_style||"blend").toLowerCase();
  const quality = r.quality_score || 0;
  const pe = r.trailing_pe || 0;
  const npm = s.net_margin_pct || 0;
  const roe = s.roe_pct || 0;
  const beta = s.beta || 0;

  const ql = quality >= 80 ? "High Quality — Strong fundamentals" :
             quality >= 60 ? "Good Quality — Solid fundamentals" :
             quality >= 40 ? "Average Quality — Mixed signals" :
                             "Below Average — Weak fundamentals";

  document.getElementById("main").innerHTML = `
    <div class="sh">
      <div>
        <div class="sh-ticker">${ticker}</div>
        <div class="sh-name">${s.sector||""} &middot; NYSE/NASDAQ</div>
        <div class="sh-tags">
          <span class="tag ${style}">${style.toUpperCase()}</span>
          <span class="tag">P/E ${pe > 0 ? pe.toFixed(1)+"×" : "N/A"}</span>
          <span class="tag">β ${beta.toFixed(3)}</span>
          ${(s.dividend_yield_pct||0) > 0 ? `<span class="tag">Div ${(s.dividend_yield_pct||0).toFixed(2)}%</span>` : ""}
          <span class="tag ${npm > 20 ? "bull" : npm < 5 ? "bear" : ""}">${npm > 20 ? "HIGH MARGIN" : npm < 5 ? "LOW MARGIN" : "MID MARGIN"}</span>
        </div>
      </div>
      <div style="text-align:right">
        <div class="sh-price">${(s.close||0).toFixed(2)}</div>
        <div class="sh-chg ${dir(npm)}">Net Margin ${pct(npm)}</div>
      </div>
    </div>

    <div class="metrics">
      <div class="mc"><div class="mc-l">Open</div><div class="mc-v">${(s.open||0).toFixed(2)}</div></div>
      <div class="mc"><div class="mc-l">High</div><div class="mc-v u">${(s.high||0).toFixed(2)}</div></div>
      <div class="mc"><div class="mc-l">Low</div><div class="mc-v d">${(s.low||0).toFixed(2)}</div></div>
      <div class="mc"><div class="mc-l">Net Margin</div><div class="mc-v ${npm > 20 ? "u" : ""}">${npm.toFixed(1)}%</div></div>
      <div class="mc"><div class="mc-l">ROE</div><div class="mc-v ${roe > 30 ? "hi" : ""}">${roe.toFixed(1)}%</div></div>

    </div>

    <div class="csec">
      <div class="csec-hd">
        <span class="csec-title">Quality Score</span>
        <span style="font-size:11px;font-weight:600;color:var(--t0)">${quality.toFixed(1)} / 100</span>
      </div>
      <div style="padding:12px 14px">
        <div class="qbar-wrap">
          <div class="qbar-track"><div class="qbar-fill" style="width:${quality}%"></div></div>
          <span style="font-size:10px;color:var(--t1);white-space:nowrap">${ql}</span>
        </div>
      </div>
    </div>

    <div class="csec">
      <div class="csec-hd">
        <span class="csec-title">Equity Ranking — All Tickers</span>
        <span class="csec-title">By Quality Score</span>
      </div>
      <table class="dtable">
        <thead><tr>
          <th>#</th><th>Ticker</th><th>Sector</th><th>Style</th>
          <th>Quality</th><th>P/E</th><th>ROE</th><th>Net Margin</th><th>vs Sector</th>
        </tr></thead>
        <tbody>${RANKING.map((x,i) => `<tr style="${x.ticker===ticker?"background:var(--bg3)":""}">
          <td class="td0">${i+1}</td>
          <td class="td0" style="cursor:pointer;color:var(--green)" onclick="select('${x.ticker}')">${x.ticker}</td>
          <td>${(x.sector||"").replace("Communication Services","Comm. Svc")}</td>
          <td><span class="tag ${(x.equity_style||"").toLowerCase()}" style="font-size:8px">${x.equity_style||""}</span></td>
          <td class="${x.quality_score>=80?"tdu":x.quality_score>=50?"td0":"tdd"}">${(x.quality_score||0).toFixed(1)}</td>
          <td>${(x.trailing_pe||0).toFixed(1)}×</td>
          <td class="${(x.roe_pct||0)>30?"tdu":""}">${(x.roe_pct||0).toFixed(1)}%</td>
          <td class="${(x.net_margin_pct||0)>20?"tdu":""}">${(x.net_margin_pct||0).toFixed(1)}%</td>
          <td class="${x.pe_vs_sector_label==="Cheap"?"tdu":x.pe_vs_sector_label==="Expensive"?"tdd":"td0"}">${x.pe_vs_sector_label||"N/A"}</td>
        </tr>`).join("")}</tbody>
      </table>
    </div>

    <div class="csec">
      <div class="csec-hd">
        <span class="csec-title">Sector Valuation</span>
        <span class="csec-title">Avg P/E · Quality · Rev Growth · Mkt Cap</span>
      </div>
      <table class="dtable">
        <thead><tr><th>Sector</th><th>Tickers</th><th>Avg P/E</th><th>Quality</th><th>Rev Growth</th><th>Avg ROE</th><th>Mkt Cap $B</th><th>Bar</th></tr></thead>
        <tbody>${SECTORS.sort((a,b)=>(b.total_market_cap||0)-(a.total_market_cap||0)).map(x => {
          const maxCap = Math.max(...SECTORS.map(s=>s.total_market_cap||0));
          const w = ((x.total_market_cap||0)/maxCap*100).toFixed(0);
          const rg = x.avg_rev_growth||0;
          return `<tr>
            <td class="td0">${x.sector}</td>
            <td>${x.ticker_count}</td>
            <td class="${(x.avg_pe||0)>40?"tdd":(x.avg_pe||0)>20?"td0":"tdu"}">${(x.avg_pe||0).toFixed(1)}×</td>
            <td class="td0">${(x.avg_quality_score||0).toFixed(1)}</td>
            <td class="${rg>15?"tdu":rg>5?"td0":"tdd"}">${rg>0?"+":""}${rg.toFixed(1)}%</td>
            <td class="td0">${(x.avg_roe||0).toFixed(1)}%</td>
            <td class="td0">$${(x.total_market_cap||0).toLocaleString("en-US",{maximumFractionDigits:0})}B</td>
            <td><div class="bar-in"><div class="bit"><div class="bif" style="width:${w}%;background:${rg>5?"#00c97a":"#e8334a"}"></div></div></div></td>
          </tr>`;
        }).join("")}</tbody>
      </table>
    </div>
  `;
}


async function load() {
  try {
    SNAPSHOT = window.__STATIC_DATA__.snapshot;
    RANKING  = window.__STATIC_DATA__.ranking;
    SECTORS  = window.__STATIC_DATA__.sectors;
    if (SNAPSHOT.length) {
      document.getElementById("runDate").textContent = "Snapshot: " + SNAPSHOT[0].date + " (static)";
      buildTape(); buildWL(); buildMovers(); buildRbar();
      select(SNAPSHOT[0].ticker);
    }
  } catch(e) { console.error(e); }
}
load();

</script>
</body>
</html>
