name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  validate:
    name: Validate Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -c "import pipeline.bronze_ingestion; import pipeline.silver_transform; import pipeline.gold_aggregations; print('All modules OK')"
        env:
          AWS_DEFAULT_REGION: us-east-1
          S3_BUCKET_RAW: projectalphav
          S3_BUCKET_PROCESSED: projectalphav
          S3_BUCKET_CURATED: projectalphav
